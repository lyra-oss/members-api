spring.application.group=lyra
spring.application.name=members-api
logging.level.root=info
spring.datasource.driver-class-name=org.postgresql.Driver
management.otlp.logging.export.enabled=false
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false
spring.docker.compose.skip.in-tests=false
spring.jpa.properties.javax.persistence.schema-generation.database.action=create-drop
spring.jpa.properties.javax.persistence.schema-generation.create-source=metadata
spring.jpa.properties.javax.persistence.schema-generation.scripts.action=create
spring.jpa.properties.javax.persistence.schema-generation.scripts.create-target=target/database/ddl.sql
#---
spring.config.activate.on-cloud-platform=kubernetes
logging.structured.format.console=ecs
management.endpoint.health.probes.enabled=true
management.otlp.logging.export.enabled=true
management.otlp.metrics.export.enabled=true
management.otlp.tracing.export.enabled=true
spring.jpa.properties.javax.persistence.schema-generation.database.action=validate
spring.jpa.properties.javax.persistence.schema-generation.scripts.action=none
