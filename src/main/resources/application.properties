logging.level.root=info
spring.application.group=edu.lyra
spring.application.name=members-api
spring.data.rest.base-path=v@parsedVersion.majorVersion@
spring.jackson.default-property-inclusion=non_empty
spring.mvc.problemdetails.enabled=true
spring.threads.virtual.enabled=true
spring.web.resources.add-mappings=false
#---
spring.config.activate.on-cloud-platform=kubernetes
logging.structured.format.console=ecs
management.endpoint.health.probes.enabled=true
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=validate
