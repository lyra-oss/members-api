name: Build Docker image

on:
  workflow_call:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          platforms: 'linux/amd64'
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set-up GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: ./mvnw -B spring-boot:build-image -Pnative
      - name: Get Maven artifact version
        id: get-artifact-version
        run: echo value=$(./mvnw -B help:evaluate -Dexpression=project.version -q -DforceStdout) >> $GITHUB_OUTPUT
      - name: Run Snyk analysis in Docker image
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/lyra-oss/members-api:${{ steps.get-artifact-version.outputs.value }}
          args: --sarif-file-output=docker.sarif
      - name: Replace security-severity null for license-related findings
        run: |
          sed -i 's/"security-severity": "null"/"security-severity": "0"/g' docker.sarif
      - name: Upload Docker image analysis results to GitHub
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        continue-on-error: true
        with:
          sarif_file: docker.sarif
          category: docker
      - name: Deploy Docker image
        run: docker push ghcr.io/lyra-oss/members-api:${{ steps.get-artifact-version.outputs.value }}
