name: Build Docker image

on:
  workflow_call:

permissions:
  pull-requests: read
  contents: read
  security-events: write
  packages: write

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set-up GraalVM
        uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085 # v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: ./mvnw -B spring-boot:build-image -Pnative
      - name: Get Maven artifact version
        id: get-artifact-version
        run: echo value=$(./mvnw -B help:evaluate -Dexpression=project.version -q -DforceStdout) >> $GITHUB_OUTPUT
      - name: Run Snyk analysis in Docker image
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/lyra-oss/members-api:${{ steps.get-artifact-version.outputs.value }}
          args: --sarif-file-output=docker.sarif
      - name: Replace security-severity null for license-related findings
        run: |
          sed -i 's/"security-severity": "null"/"security-severity": "0"/g' ../docker.sarif
      - name: Upload Docker image analysis results to GitHub
        uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1 # v4
        continue-on-error: true
        with:
          sarif_file: docker.sarif
          category: docker
      - name: Deploy Docker image
        run: docker push ghcr.io/lyra-oss/members-api:${{ steps.get-artifact-version.outputs.value }}
